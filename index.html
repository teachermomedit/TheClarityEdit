const LESSONS = {
  1: { title:"Finding your baseline", body:"Before you can improve, you need to hear yourself. This week's focus is awareness — not perfection. You're going to notice your patterns: when you hedge ('I think maybe...'), when you trail off, when you fill silence with 'um' or 'like'. The goal isn't to fix them yet. It's to catch them. Every session this week, your only job is to try and notice one moment where you could have been sharper. That noticing IS the work.", tip:"Before each response today, take one breath and say your first word confidently. Just the first word. Everything after will follow." },
  2: { title:"Hearing yourself clearly", body:"This week you start identifying your strongest moments — not just your weakest ones. When did you sound most like yourself? When did your voice carry weight? Confidence in speech is built by replicating your best moments, not by eliminating your worst ones. You already have the capability. The app is helping you find it consistently.", tip:"After each phase today, ask yourself: was there one sentence in there that felt right? Hold onto that feeling. That's the version of you we're training toward." },
  3: { title:"The STAR structure", body:"Today you're learning the single most powerful speaking structure for adults: STAR. Situation (set the scene briefly), Task (what was your role or challenge), Action (what YOU specifically did), Result (what happened). Every story, every professional answer, every time you need to explain something complex — STAR organizes it. You don't say the letters out loud. You just build your answer in that shape.", tip:"For your Pro Speak and Story phases today, try building your answer in STAR order before you speak. Even 5 seconds of mental organizing changes everything." },
  4: { title:"Taking a stand", body:"This week is about commitment. The biggest gap in most people's speaking isn't vocabulary or structure — it's the unwillingness to commit. 'I think maybe we could perhaps consider...' is seven words that say nothing. 'Here's what I recommend' is four words that say everything. You can be wrong. You can change your mind later. But right now, in this moment, commit.", tip:"For your Decision Drill today, say your answer in the first sentence. Not at the end after you've thought out loud for 90 seconds — at the start. Lead with your call. Then explain it." },
  5: { title:"Using words with precision", body:"Vocabulary isn't about using big words — it's about using the right word. The right word does three jobs at once: it's precise (means exactly what you need), it's natural (sounds like you, not a thesaurus), and it's memorable (the listener holds onto it). This week, don't force the vocabulary words. Experiment with them. If a word feels wrong in your mouth, it'll sound wrong to your listener.", tip:"Before your vocab phases today, say the word out loud three times on its own. Hear how it sounds. Then use it once in a sentence about your own life before you use it in the prompt." },
  6: { title:"Opening strong", body:"Research on first impressions in speech shows that your first sentence sets the tone for everything that follows. A weak opener — 'Um, so I guess what I'm trying to say is...' — makes your listener lean back. A strong opener — 'Here's what I know about this' — makes them lean forward. You have three seconds. Use them. This week every phase starts with a confident first sentence before anything else.", tip:"Your strong opener formula: [State your position or key point] + [then explain]. Not the other way around. Lead with the point, follow with the reasoning." },

};

// ── HELPERS ──────────────────────────────────────────────────────
function getRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function getWeek(sessions){ return Math.min(8, Math.floor(sessions/5)+1); }
function getDayInWeek(sessions){ return (sessions%5)+1; }

function getVocabForWeek(week){
  return VOCAB[week] || VOCAB[1];
}

function buildPrompt(phase, week){
  const vocab = getVocabForWeek(week);
  if(phase.type==="vocab")     return getRandom(vocab);
  if(phase.type==="decision")  return getRandom(PROMPTS.decision);
  if(phase.type==="emotion")   return getRandom(PROMPTS.emotion);
  if(phase.type==="lesson")    return LESSONS[week] || LESSONS[1];
  if(phase.id==="casual")      return getRandom(PROMPTS.casual);
  if(phase.id==="pro")         return getRandom(PROMPTS.pro);
  if(phase.id==="story")       return getRandom(PROMPTS.story);
  return "";
}

async function callClaude(system, userMsg){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({ model:"claude-sonnet-4-5", max_tokens:900, system, messages:[{role:"user",content:userMsg}] })
  });
  if(!res.ok){ const t=await res.text(); throw new Error(`${res.status}: ${t.slice(0,150)}`); }
  const data=await res.json();
  return data.content?.find(b=>b.type==="text")?.text||"";
}

// ── CIRCULAR TIMER ───────────────────────────────────────────────
function Timer({timeLeft,total,color}){
  const r=52,circ=2*Math.PI*r,offset=circ*(1-timeLeft/total);
  return(
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r={r} fill="none" stroke={C.oat} strokeWidth="8"/>
      <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="8"
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        transform="rotate(-90 60 60)" style={{transition:"stroke-dashoffset 1s linear"}}/>
      <text x="60" y="56" textAnchor="middle" fill={C.char} fontSize="20" fontWeight="700" fontFamily="'Jost',sans-serif">
        {String(Math.floor(timeLeft/60)).padStart(2,"0")}:{String(timeLeft%60).padStart(2,"0")}
      </text>
      <text x="60" y="72" textAnchor="middle" fill={C.light} fontSize="10" fontFamily="'Jost',sans-serif">left</text>
    </svg>
  );
}

// ── SCORE RING ───────────────────────────────────────────────────
function Ring({score,color,label,size=72}){
  const r=(size/2)-7,circ=2*Math.PI*r,offset=circ*(1-score/100);
  return(
    <div style={{textAlign:"center"}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.oat} strokeWidth="6"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 1s ease"}}/>
        <text x={size/2} y={size/2+5} textAnchor="middle" fill={C.char} fontSize="16" fontWeight="700" fontFamily="'Jost',sans-serif">{score}</text>
      </svg>
      <div style={{color:C.mid,fontSize:10,fontWeight:600,marginTop:2,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
    </div>
  );
}

// ── INLINE FEEDBACK ──────────────────────────────────────────────
function InlineFb({text,color}){
  if(!text) return null;
  return(
    <div style={{background:C.oat,border:`1px solid ${color}`,borderRadius:12,padding:"14px 16px",marginTop:10}}>
      <div style={{color,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Coach Feedback</div>
      <div style={{color:C.char,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{text}</div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────
export default function App(){
  const [screen,setScreen]         = useState("home");
  const [phaseIndex,setPhaseIndex] = useState(0);
  const [timeLeft,setTimeLeft]     = useState(0);
  const [running,setRunning]       = useState(false);
  const [response,setResponse]     = useState("");
  const [responses,setResponses]   = useState([]);
  const [currentPrompt,setCurrentPrompt] = useState(null);
  const [sessionPhases,setSessionPhases] = useState([]);
  const [feedback,setFeedback]     = useState("");
  const [loadingFb,setLoadingFb]   = useState(false);
  const [inlineFb,setInlineFb]     = useState("");
  const [loadingInline,setLoadingInline] = useState(false);
  const [inlineDone,setInlineDone] = useState(false);
  const [teachMe,setTeachMe]       = useState(false);
  const [scores,setScores]         = useState({opener:0,hedges:0,completion:0,vocabulary:0,commitment:0});
  const [sessions,setSessions]     = useState(()=>{try{return JSON.parse(localStorage.getItem("ce_sessions")||"[]")}catch{return []}});
  const [streak,setStreak]         = useState(()=>parseInt(localStorage.getItem("ce_streak")||"0"));
  const [lastDate,setLastDate]     = useState(()=>localStorage.getItem("ce_lastDate")||"");
  const [showAssessment,setShowAssessment] = useState(false);
  const [assessmentResponses,setAssessmentResponses] = useState({});
  const [assessmentFb,setAssessmentFb] = useState("");
  const [loadingAssessment,setLoadingAssessment] = useState(false);
  const [diagnostic,setDiagnostic] = useState(()=>{try{return JSON.parse(localStorage.getItem("ce_diagnostic")||"null")}catch{return null}});
  const timerRef = useRef(null);

  const week     = getWeek(sessions.length);
  const dayInWk  = getDayInWeek(sessions.length);
  const curriculum = CURRICULUM[week]||CURRICULUM[1];
  const isAssessmentDay = dayInWk===5; // Every 5th session = assessment
  const isDiagnosticDue = sessions.length===5 && !diagnostic;

  const currentPhase = sessionPhases[phaseIndex]||PHASES[0];

  // ── Timer ──
  useEffect(()=>{
    if(!running) return;
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{ if(t<=1){clearInterval(timerRef.current);setRunning(false);return 0;} return t-1; });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[running]);

  function startSession(){
    const phases = PHASES.map(p=>({...p,prompt:buildPrompt(p,week)}));
    setSessionPhases(phases);
    setPhaseIndex(0);
    setTimeLeft(PHASES[0].duration||0);
    setResponse(""); setResponses([]); setFeedback("");
    setInlineFb(""); setInlineDone(false); setTeachMe(false);
    setScreen("session"); setRunning(false);
    setCurrentPrompt(phases[0].prompt);
  }

  async function checkVocab(){
    if(!response.trim()||loadingInline) return;
    setLoadingInline(true); setInlineFb("");
    const w=currentPhase.prompt;
    try{
      const fb=await callClaude(
        `You are a vocabulary coach. Warm and direct. Under 120 words. Three lines only:
LINE 1: Did they use "${w?.word}" correctly? Yes/partially/no and one sentence why.
LINE 2: Did it sound natural or forced? One honest sentence.
LINE 3: Start with "Try: " — show a stronger version of their sentence.`,
        `Word: "${w?.word}" — ${w?.def}\nTheir response: "${response}"`
      );
      setInlineFb(fb);
    }catch(e){setInlineFb(`Couldn't check: ${e.message}`);}
    setLoadingInline(false); setInlineDone(true);
  }

  async function checkEmotion(){
    if(!response.trim()||loadingInline) return;
    setLoadingInline(true); setInlineFb("");
    const sc=currentPhase.prompt;
    try{
      const fb=await callClaude(
        `You are a child development and emotional regulation coach for Stephanie — a K-8 ESL instructional coach and mom of two (ages 1 and 3). She is practicing parenting responses before they happen.

Three short paragraphs:
1. REGULATE or ESCALATE? Be specific about why her response would regulate or escalate her child's nervous system.
2. What was the strongest thing she said — the part that was warm, clear, or boundaried?
3. Give ONE alternative opening line that is both firm AND emotionally attuned — real mom language, not textbook.

Under 160 words. Direct and warm.`,
        `Situation: ${sc?.s}\nGoal: ${sc?.g}\nHer response: "${response}"`
      );
      setInlineFb(fb);
    }catch(e){setInlineFb(`Couldn't check: ${e.message}`);}
    setLoadingInline(false); setInlineDone(true);
  }

  function advancePhase(){
    clearInterval(timerRef.current); setRunning(false);
    const newR=[...responses,{phase:currentPhase,text:response,inline:inlineFb}];
    setResponses(newR);
    setResponse(""); setInlineFb(""); setInlineDone(false); setTeachMe(false);
    if(phaseIndex<PHASES.length-1){
      const next=phaseIndex+1;
      setPhaseIndex(next);
      setTimeLeft(sessionPhases[next]?.duration||0);
      setCurrentPrompt(sessionPhases[next]?.prompt);
    } else {
      finishSession(newR);
    }
  }

  async function finishSession(allR){
    setScreen("feedback"); setLoadingFb(true); setFeedback("");
    const today=new Date().toDateString();
    let ns=streak;
    if(lastDate!==today){ns=streak+1;setStreak(ns);setLastDate(today);localStorage.setItem("ce_streak",ns);localStorage.setItem("ce_lastDate",today);}

    const summary=allR.map(r=>{
      const p=r.phase;
      const pr=p.type==="vocab"?`Word: ${p.prompt?.word}`:p.type==="emotion"?`Situation: ${p.prompt?.s}`:p.type==="lesson"?`Lesson: ${p.prompt?.title}`:`Prompt: ${p.prompt}`;
      return `[${p.label}] ${pr}\nResponse: ${r.text||(p.type==="lesson"?"(lesson read)":"blank")}\n${r.inline?`Inline fb: ${r.inline}`:""}`;
    }).join("\n\n");

    try{
      const text=await callClaude(
        `You are a structured speaking coach for Stephanie — a Chinese-Vietnamese Canadian mom of two (ages 1 and 3), K-8 ESL instructional coach on mat leave, entrepreneur building The Clarity Edit. Smart and capable but loses her train of thought, hedges under pressure, undersells her expertise. She is in Week ${week} of her curriculum (focus: ${curriculum.theme}).

Score her session on FIVE dimensions (0-20 each, total 100):
OPENER STRENGTH — did her first sentence land with confidence or did she warm up slowly?
HEDGE COUNT — how many times did she say "I think maybe/kind of/I guess/sort of"? Fewer = higher score.
COMPLETION — did she finish her thoughts or trail off?
VOCABULARY RANGE — did she use precise varied words or default to basics?
COMMITMENT — did she take clear stands or stay wishy-washy?

Format your response EXACTLY like this:
SCORES: opener=[0-20] hedges=[0-20] completion=[0-20] vocabulary=[0-20] commitment=[0-20]

🌟 WHAT LANDED — one specific moment she sounded expert or confident, name it exactly
⚠️ PUSH HERE — her #1 pattern this session, show a stronger version of one sentence she actually wrote
🧘 PARENT MOMENT — was her emotion response regulating or escalating? What made the difference?
📈 THIS WEEK — one specific note tied to Week ${week} focus: ${curriculum.focus}
💡 PHRASE TO OWN — one confident natural sentence she can say in real life this week

Under 320 words. Warm but honest. Zero filler.`,
        `Week ${week}, Day ${dayInWk}. Sessions completed: ${sessions.length}.\n\n${summary}\n\nScore and coach me.`
      );

      // Parse scores from response
      const scoreMatch = text.match(/SCORES:\s*opener=(\d+)\s*hedges=(\d+)\s*completion=(\d+)\s*vocabulary=(\d+)\s*commitment=(\d+)/);
      const parsedScores = scoreMatch ? {
        opener:     parseInt(scoreMatch[1]),
        hedges:     parseInt(scoreMatch[2]),
        completion: parseInt(scoreMatch[3]),
        vocabulary: parseInt(scoreMatch[4]),
        commitment: parseInt(scoreMatch[5]),
      } : {opener:12,hedges:12,completion:12,vocabulary:12,commitment:12};
      setScores(parsedScores);

      const cleanText = text.replace(/SCORES:[^\n]+\n?/,"").trim();
      setFeedback(cleanText);

      // Extract phrase to own
      const phraseMatch = cleanText.match(/💡[^\n]*\n([^\n]+)/);
      const phrase = phraseMatch?.[1]?.trim()||"";

      const sessionData={
        id:Date.now().toString(),
        date:new Date().toLocaleDateString("en-CA"),
        week, dayInWk, streak:ns,
        scores:parsedScores,
        total:Object.values(parsedScores).reduce((a,b)=>a+b,0),
        summary:cleanText.slice(0,200),
        phraseToOwn:phrase,
      };
      const updated=[...sessions,sessionData].slice(-90);
      setSessions(updated);
      localStorage.setItem("ce_sessions",JSON.stringify(updated));

      // Generate diagnostic after session 5
      if(updated.length===5 && !diagnostic){
        generateDiagnostic(updated);
      }
    }catch(e){
      setFeedback(`⚠️ Feedback unavailable: ${e.message}\n\nYour session is saved. Keep going.`);
    }
    setLoadingFb(false);
  }

  async function generateDiagnostic(allSessions){
    const avgScores={opener:0,hedges:0,completion:0,vocabulary:0,commitment:0};
    allSessions.forEach(s=>Object.keys(avgScores).forEach(k=>avgScores[k]+=s.scores[k]||0));
    Object.keys(avgScores).forEach(k=>avgScores[k]=Math.round(avgScores[k]/allSessions.length));
    const weakest=Object.entries(avgScores).sort((a,b)=>a[1]-b[1])[0][0];
    const strongest=Object.entries(avgScores).sort((a,b)=>b[1]-a[1])[0][0];
    const level=avgScores.opener+avgScores.hedges+avgScores.completion+avgScores.vocabulary+avgScores.commitment;
    const levelName=level<50?"Foundational":level<70?"Developing":level<85?"Proficient":"Advanced";
    const d={avgScores,weakest,strongest,level:levelName,date:new Date().toLocaleDateString("en-CA")};
    setDiagnostic(d);
    localStorage.setItem("ce_diagnostic",JSON.stringify(d));
  }

  // ── WEEKLY ASSESSMENT ──
  async function runAssessment(){
    setLoadingAssessment(true); setAssessmentFb("");
    const responses_text = ASSESSMENT_PROMPTS.map(p=>`[${p.label}]\nPrompt: ${p.prompt}\nResponse: ${assessmentResponses[p.id]||"(blank)"}`).join("\n\n");
    try{
      const fb=await callClaude(
        `You are scoring Stephanie's weekly standardized assessment. She does these SAME 5 prompts every week so results are comparable over time. She is in Week ${week} of The Clarity Edit curriculum.

Score each of the 5 dimensions out of 100 based on ALL her responses together:
- Opener Strength (0-100)
- Hedge Count (0-100, higher = fewer hedges)
- Completion Rate (0-100)
- Vocabulary Range (0-100)
- Commitment Score (0-100)

Format EXACTLY:
WEEKLY SCORES: opener=[score] hedges=[score] completion=[score] vocabulary=[score] commitment=[score]

Then write a 150-word weekly progress report:
- What improved most since last week?
- What is still her #1 gap?
- One specific drill to add to her daily practice next week
- Where she'll be in 4 weeks if she stays consistent (make it vivid and specific to her life)`,
        `Week ${week} assessment.\n\n${responses_text}`
      );
      setAssessmentFb(fb);
    }catch(e){setAssessmentFb(`Assessment unavailable: ${e.message}`);}
    setLoadingAssessment(false);
  }

  // ── HOME SCREEN ──────────────────────────────────────────────
  if(screen==="home") return(
    <div style={{minHeight:"100vh",background:C.cream,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 20px"}}>
      <div style={{maxWidth:440,width:"100%"}}>

        {/* Brand header */}
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,fontWeight:600,color:C.terra,textTransform:"uppercase",letterSpacing:3,marginBottom:8}}>Teacher Mom Edit</div>
          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:700,color:C.char,lineHeight:1.1,marginBottom:8}}>The Clarity Edit</h1>
          <p style={{color:C.mid,fontSize:14,lineHeight:1.6}}>15 minutes every morning. Your clarity back.</p>
        </div>

        {/* Week banner */}
        <div style={{background:C.terra,borderRadius:16,padding:"16px 20px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{color:C.terraXl,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Week {week} — {curriculum.label}</div>
            <div style={{color:"white",fontSize:15,fontWeight:600,marginTop:2}}>{curriculum.theme}</div>
            <div style={{color:C.terraLt,fontSize:12,marginTop:2}}>{curriculum.focus}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"white",fontSize:28,fontWeight:800}}>Day {dayInWk}</div>
            <div style={{color:C.terraLt,fontSize:11}}>of 5</div>

        </div>

        {/* Identity reminder */}
        <div style={{background:C.oat,border:`1px solid ${C.terraLt}`,borderRadius:16,padding:"16px 20px",marginBottom:16}}>

        </div>

        {/* Streak + diagnostic */}
        <div style={{display:"flex",gap:10,marginBottom:16}}>

            <div style={{color:C.terra,fontSize:16,fontWeight:800}}>{streak}</div>
            <div style={{color:C.mid,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>Day streak</div>

      {/* Weekly Assessment Modal */}

        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(58,53,48,0.7)",display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px",overflowY:"auto",zIndex:100}}>
          <div style={{background:C.cream,borderRadius:24,padding:"24px",maxWidth:440,width:"100%",marginTop:20}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:C.char,marginBottom:4}}>Weekly Assessment</div>

                <textarea value={assessmentResponses[p.id]||""} onChange={e=>setAssessmentResponses({...assessmentResponses,[p.id]:e.target.value})}
                  placeholder="Speak out loud then type what you said..."
                  style={{width:"100%",minHeight:70,background:C.oat,border:`1px solid ${C.terraLt}`,borderRadius:10,color:C.char,fontSize:13,padding:"12px",resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.5}}/>

            <div style={{display:"flex",gap:8}}>

    return(
      <div style={{minHeight:"100vh",background:C.cream,display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 20px 50px"}}>

          {PHASES.map((p,i)=>(
            <div key={p.id} style={{flex:i===phaseIndex?2:1,height:4,borderRadius:2,transition:"all 0.3s",background:i<phaseIndex?p.color:i===phaseIndex?color:C.oat}}/>
          ))}

            </div>

              <div style={{color:C.terra,fontSize:10,fontWeight:700}}>WK {week}</div>
            </div>

          {isLesson&&<>
            <div style={{background:C.oat,borderRadius:14,padding:"18px",marginBottom:16,border:`1px solid ${C.sageLt}`}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:C.char,marginBottom:8}}>{prompt?.title}</div>
              <div style={{color:C.char,fontSize:14,lineHeight:1.8}}>{prompt?.body}</div>
            </div>
            <div style={{background:C.terra,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
              <div style={{color:C.terraXl,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Today's Tip</div>
              <div style={{color:"white",fontSize:13,lineHeight:1.6}}>{prompt?.tip}</div>
            </div>
            <button onClick={advancePhase} style={{background:C.terra,color:"white",border:"none",borderRadius:12,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}}>
              Got it — let's practice →
            </button>
          </>}

          {/* VOCAB PHASE */}
          {isVocab&&<>
            <div style={{background:C.oat,borderRadius:14,padding:"18px",marginBottom:12,border:`1px solid ${C.terraLt}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:C.terra,marginBottom:4}}>{prompt?.word}</div>
                  <div style={{color:C.mid,fontSize:13,marginBottom:8,lineHeight:1.5}}>{prompt?.def}</div>
                  <div style={{color:C.char,fontSize:12,fontStyle:"italic",borderTop:`1px solid ${C.terraLt}`,paddingTop:8}}>"{prompt?.example}"</div>
                </div>
              </div>
            </div>

            {/* Teach Me */}
            {!teachMe&&<button onClick={()=>setTeachMe(true)} style={{background:"transparent",color:C.terra,border:`1px solid ${C.terra}`,borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer",width:"100%",marginBottom:12}}>
              📖 Teach Me This Word
            </button>}
            {teachMe&&<div style={{background:C.terraXl,border:`1px solid ${C.terraLt}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
              <div style={{color:C.terra,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Deep Dive</div>
              <div style={{color:C.char,fontSize:13,lineHeight:1.7}}>{prompt?.teach}</div>
            </div>}

            {currentPhase.duration>0&&<div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
              <Timer timeLeft={timeLeft} total={currentPhase.duration} color={color}/>
            </div>}
            {!running&&timeLeft===currentPhase.duration&&currentPhase.duration>0&&(
              <button onClick={()=>setRunning(true)} style={{background:color,color:"white",border:"none",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:10}}>
                ▶ Start Timer
              </button>
            )}
            <textarea value={response} onChange={e=>setResponse(e.target.value)} placeholder="Use the word in a sentence from your real life..."
              style={{width:"100%",minHeight:80,background:C.oat,border:`1px solid ${C.terraLt}`,borderRadius:12,color:C.char,fontSize:14,padding:"14px",resize:"vertical",lineHeight:1.6,outline:"none",boxSizing:"border-box"}}/>
            {!inlineDone&&<button onClick={checkVocab} disabled={loadingInline||!response.trim()} style={{background:loadingInline?C.oat:`${color}22`,color:loadingInline?C.light:color,border:`1px solid ${color}66`,borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:loadingInline?"default":"pointer",width:"100%",marginTop:8}}>
              {loadingInline?"Checking...":"✓ Check My Vocab"}
            </button>}
            <InlineFb text={inlineFb} color={color}/>
          </>}

          {/* EMOTION PHASE */}
          {isEmotion&&<>
            <div style={{background:C.oat,borderRadius:14,padding:"18px",marginBottom:14,border:`1px solid ${C.gold}55`}}>
              <div style={{color:C.gold,fontSize:12,fontWeight:700,marginBottom:8}}>The Situation</div>
              <div style={{color:C.char,fontSize:14,lineHeight:1.6,marginBottom:10}}>{prompt?.s}</div>
              <div style={{color:C.mid,fontSize:12,borderTop:`1px solid ${C.terraLt}`,paddingTop:8}}>Goal: {prompt?.g}</div>
            </div>
            {currentPhase.duration>0&&<div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
              <Timer timeLeft={timeLeft} total={currentPhase.duration} color={color}/>
            </div>}
            {!running&&timeLeft===currentPhase.duration&&<button onClick={()=>setRunning(true)} style={{background:color,color:"white",border:"none",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:10}}>
              ▶ Start Timer
            </button>}
            <textarea value={response} onChange={e=>setResponse(e.target.value)} placeholder="Say your response out loud, then type it here..."
              style={{width:"100%",minHeight:80,background:C.oat,border:`1px solid ${C.gold}55`,borderRadius:12,color:C.char,fontSize:14,padding:"14px",resize:"vertical",lineHeight:1.6,outline:"none",boxSizing:"border-box"}}/>
            {!inlineDone&&<button onClick={checkEmotion} disabled={loadingInline||!response.trim()} style={{background:loadingInline?C.oat:`${C.gold}22`,color:loadingInline?C.light:C.gold,border:`1px solid ${C.gold}66`,borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:loadingInline?"default":"pointer",width:"100%",marginTop:8}}>
              {loadingInline?"Checking...":"✓ Check My Response"}
            </button>}
            <InlineFb text={inlineFb} color={C.gold}/>
          </>}

          {/* STANDARD PROMPT PHASES */}
          {!isLesson&&!isVocab&&!isEmotion&&<>
            <div style={{background:C.oat,borderRadius:14,padding:"18px",marginBottom:14,border:`1px solid ${color}44`}}>
              <div style={{color:C.char,fontSize:14,lineHeight:1.6,fontStyle:"italic"}}>"{prompt}"</div>
            </div>
            {currentPhase.duration>0&&<div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
              <Timer timeLeft={timeLeft} total={currentPhase.duration} color={color}/>
            </div>}
            {!running&&timeLeft===currentPhase.duration&&<button onClick={()=>setRunning(true)} style={{background:color,color:"white",border:"none",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%",marginBottom:10}}>
              ▶ Start Timer
            </button>}
            <textarea value={response} onChange={e=>setResponse(e.target.value)} placeholder="Speak out loud then capture what you said..."
              style={{width:"100%",minHeight:80,background:C.oat,border:`1px solid ${color}44`,borderRadius:12,color:C.char,fontSize:14,padding:"14px",resize:"vertical",lineHeight:1.6,outline:"none",boxSizing:"border-box"}}/>
          </>}

          {/* Navigation */}
          {!isLesson&&<div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={()=>{clearInterval(timerRef.current);setRunning(false);setTimeLeft(currentPhase.duration||0);setResponse("");setInlineFb("");setInlineDone(false);setTeachMe(false);setCurrentPrompt(buildPrompt(currentPhase,week));}}
              style={{background:C.oat,color:C.mid,border:`1px solid ${C.terraLt}`,borderRadius:10,padding:"12px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>
              ↺ Redo
            </button>
            <button onClick={advancePhase} style={{background:phaseIndex===PHASES.length-1?C.sage:C.terra,color:"white",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",flex:1}}>
              {phaseIndex===PHASES.length-1?"✓ Finish Session":"Next →"}
            </button>
          </div>}
        </div>
      </div>
    );
  }

  // ── FEEDBACK SCREEN ──────────────────────────────────────────
  if(screen==="feedback") return(
    <div style={{minHeight:"100vh",background:C.cream,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 20px 60px"}}>
      <div style={{maxWidth:440,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:36,marginBottom:6}}>✅</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:C.char}}>Session Complete</div>
          {streak>0&&<div style={{color:C.terra,fontSize:13,fontWeight:600,marginTop:4}}>🔥 {streak}-day streak</div>}
        </div>

        {/* 5-dimension scores */}
        <div style={{background:"white",borderRadius:20,padding:"20px",marginBottom:14,border:`1px solid ${C.oat}`,boxShadow:"0 2px 12px rgba(58,53,48,0.05)"}}>
          <div style={{color:C.terra,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:16}}>Today's Scores</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {[
              {key:"opener",    label:"Opener",     color:C.terra},
              {key:"hedges",    label:"Hedges",     color:C.sage},
              {key:"completion",label:"Complete",   color:"#8B7355"},
              {key:"vocabulary",label:"Vocab",      color:"#5A7A8F"},
              {key:"commitment",label:"Commit",     color:"#8F5A7A"},
            ].map(d=>(
              <Ring key={d.key} score={scores[d.key]||0} color={d.color} label={d.label} size={60}/>
            ))}
          </div>
          <div style={{textAlign:"center",marginTop:12,color:C.terra,fontSize:18,fontWeight:800}}>
            {Object.values(scores).reduce((a,b)=>a+b,0)}<span style={{color:C.light,fontSize:12,fontWeight:400}}>/100</span>
          </div>
        </div>

        {/* Session recap */}
        <div style={{marginBottom:14}}>
          {responses.slice(1).map((r,i)=>(
            <div key={i} style={{background:"white",borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.oat}`}}>
              <div style={{color:PHASES[i+1]?.color||C.terra,fontSize:11,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>{r.phase.icon} {r.phase.label}</div>
              <div style={{color:C.mid,fontSize:12,lineHeight:1.5}}>{r.text?`"${r.text.slice(0,100)}${r.text.length>100?"...":""}"` :<span style={{color:C.light,fontStyle:"italic"}}>Nothing entered</span>}</div>
            </div>
          ))}
        </div>

        {/* AI feedback */}
        <div style={{background:"white",borderRadius:20,padding:"22px",border:`1px solid ${C.oat}`,marginBottom:16,boxShadow:"0 2px 12px rgba(58,53,48,0.05)"}}>
          <div style={{color:C.terra,fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Your Coach</div>
          {loadingFb
            ?<div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{color:C.terra,fontSize:24,marginBottom:8}}>⏳</div>
              <div style={{color:C.mid,fontSize:13}}>Analyzing your session...</div>
              <div style={{color:C.light,fontSize:11,marginTop:4}}>About 15 seconds</div>
            </div>
            :<div style={{color:C.char,fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{feedback}</div>
          }
        </div>

        {/* Diagnostic banner */}
        {isDiagnosticDue&&diagnostic&&<div style={{background:C.sage,borderRadius:16,padding:"16px",marginBottom:16}}>
          <div style={{color:"white",fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Your Diagnostic Result</div>
          <div style={{color:"white",fontSize:18,fontWeight:800,marginBottom:4}}>Level: {diagnostic.level}</div>
          <div style={{color:C.sageLt,fontSize:13}}>Your strongest area: {diagnostic.strongest} · Focus area: {diagnostic.weakest}</div>
        </div>}

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"transparent",color:C.terra,border:`1px solid ${C.terra}`,borderRadius:14,padding:"14px",fontSize:13,fontWeight:600,cursor:"pointer",flex:1}}>
            📊 Progress
          </button>
          <button onClick={()=>setScreen("home")} style={{background:C.terra,color:"white",border:"none",borderRadius:14,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer",flex:2}}>
            Done
          </button>
        </div>
      </div>
    </div>
  );

  // ── DASHBOARD SCREEN ─────────────────────────────────────────
  if(screen==="dashboard"){
    const latest=sessions.length?sessions[sessions.length-1]:null;
    const DIMS=[
      {key:"opener",    label:"Opener",     color:C.terra},
      {key:"hedges",    label:"Hedges",     color:C.sage},
      {key:"completion",label:"Completion", color:"#8B7355"},
      {key:"vocabulary",label:"Vocabulary", color:"#5A7A8F"},
      {key:"commitment",label:"Commitment", color:"#8F5A7A"},
    ];

    function spark(key,w=90,h=32){
      const vals=sessions.map(s=>s.scores?.[key]||0);
      if(vals.length<2) return null;
      const mn=Math.min(...vals)-2,mx=Math.max(...vals)+2,rng=mx-mn||1;
      return vals.map((v,i)=>`${(i/(vals.length-1))*w},${h-((v-mn)/rng)*h}`).join(" ");
    }

    const overallNow=latest?Math.round(Object.values(latest.scores).reduce((a,b)=>a+b,0)/5):0;
    const first=sessions[0];
    const overallStart=first?Math.round(Object.values(first.scores).reduce((a,b)=>a+b,0)/5):0;

    return(
      <div style={{minHeight:"100vh",background:C.cream,paddingBottom:50}}>
        <div style={{background:"white",padding:"24px 20px 18px",borderBottom:`1px solid ${C.oat}`}}>
          <div style={{maxWidth:440,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,fontWeight:600,color:C.terra,textTransform:"uppercase",letterSpacing:2}}>Teacher Mom Edit</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:C.char,marginTop:2}}>The Clarity Edit</div>
              <div style={{color:C.mid,fontSize:12,marginTop:2}}>{sessions.length} sessions · {streak>0?`🔥 ${streak}-day streak`:"Start your streak"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{color:C.sage,fontSize:28,fontWeight:900}}>+{overallNow-overallStart}</div>
              <div style={{color:C.light,fontSize:10,textTransform:"uppercase"}}>Overall gain</div>
            </div>
          </div>
        </div>

        <div style={{maxWidth:440,margin:"0 auto",padding:"16px 20px"}}>

          {/* Diagnostic */}
          {diagnostic&&<div style={{background:C.terra,borderRadius:16,padding:"18px",marginBottom:14}}>
            <div style={{color:C.terraXl,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Your Level</div>
            <div style={{color:"white",fontSize:22,fontWeight:800,marginBottom:4}}>{diagnostic.level}</div>
            <div style={{display:"flex",gap:16}}>
              <div><div style={{color:C.terraLt,fontSize:10,textTransform:"uppercase"}}>Strongest</div><div style={{color:"white",fontSize:12,fontWeight:600}}>{diagnostic.strongest}</div></div>
              <div><div style={{color:C.terraLt,fontSize:10,textTransform:"uppercase"}}>Focus area</div><div style={{color:"white",fontSize:12,fontWeight:600}}>{diagnostic.weakest}</div></div>
              <div><div style={{color:C.terraLt,fontSize:10,textTransform:"uppercase"}}>Assessed</div><div style={{color:"white",fontSize:12,fontWeight:600}}>{diagnostic.date}</div></div>
            </div>
          </div>}

          {sessions.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.light}}>
            <div style={{fontSize:36,marginBottom:12}}>📊</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:6,color:C.mid}}>No sessions yet</div>
            <div style={{fontSize:13}}>Complete your first session to see your progress</div>
          </div>}

          {sessions.length>0&&<>
            {/* 5-dimension cards */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {DIMS.map(d=>{
                const now=latest?.scores[d.key]||0;
                const pts=spark(d.key);
                const startVal=first?.scores[d.key]||0;
                return(
                  <div key={d.key} style={{background:"white",borderRadius:16,padding:"14px",border:`1px solid ${C.oat}`,boxShadow:"0 1px 8px rgba(58,53,48,0.04)"}}>
                    <div style={{color:d.color,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{d.label}</div>
                    <div style={{color:C.char,fontSize:26,fontWeight:900,margin:"4px 0 2px"}}>{now}</div>
                    {pts&&<svg width="100%" height="32" viewBox="0 0 90 32" preserveAspectRatio="none" style={{marginBottom:4}}>
                      <polyline points={pts} fill="none" stroke={d.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>}
                    <div style={{color:C.light,fontSize:10}}>started at {startVal} · <span style={{color:now>=startVal?C.sage:C.terra,fontWeight:700}}>{now>=startVal?"+":""}{now-startVal}</span></div>
                  </div>
                );
              })}
            </div>

            {/* Phrase to own */}
            {latest?.phraseToOwn&&<div style={{background:"white",border:`1px solid ${C.terraLt}`,borderRadius:16,padding:"18px",marginBottom:14,boxShadow:"0 1px 8px rgba(58,53,48,0.04)"}}>
              <div style={{color:C.terra,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>💡 This Week's Phrase to Own</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,color:C.char,fontStyle:"italic",lineHeight:1.6}}>"{latest.phraseToOwn}"</div>
              <div style={{color:C.light,fontSize:11,marginTop:8}}>Say this out loud before your next conversation</div>
            </div>}

            {/* Curriculum progress */}
            <div style={{background:"white",borderRadius:16,padding:"18px",marginBottom:14,border:`1px solid ${C.oat}`}}>
              <div style={{color:C.terra,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Curriculum Progress</div>
              {Object.entries(CURRICULUM).map(([w,c])=>{
                const wNum=parseInt(w);
                const done=wNum<week;
                const current=wNum===week;
                return(
                  <div key={w} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:wNum<8?`1px solid ${C.oat}`:"none",opacity:wNum>week?0.4:1}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:done?C.sage:current?C.terra:C.oat,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{color:"white",fontSize:10,fontWeight:700}}>{done?"✓":w}</span>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{color:current?C.terra:done?C.sage:C.mid,fontSize:12,fontWeight:700}}>{c.label}</div>
                      <div style={{color:C.light,fontSize:11}}>{c.theme}</div>
                    </div>
                    {current&&<div style={{color:C.terra,fontSize:10,fontWeight:700,background:C.terraXl,padding:"2px 8px",borderRadius:6}}>Now</div>}
                  </div>
                );
              })}
            </div>

            {/* Session history */}
            <div style={{marginBottom:14}}>
              <div style={{color:C.mid,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Recent Sessions</div>
              {[...sessions].reverse().slice(0,8).map((s,i)=>(
                <div key={s.id} style={{background:"white",borderRadius:12,padding:"12px 14px",marginBottom:8,border:`1px solid ${C.oat}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <div style={{color:C.char,fontSize:12,fontWeight:700}}>Wk {s.week} · {s.date}</div>
                    <div style={{display:"flex",gap:8}}>
                      {DIMS.map(d=>(
                        <div key={d.key} style={{textAlign:"center"}}>
                          <div style={{color:d.color,fontSize:11,fontWeight:700}}>{s.scores?.[d.key]||0}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  {s.phraseToOwn&&<div style={{color:C.mid,fontSize:11,fontStyle:"italic"}}>💡 "{s.phraseToOwn}"</div>}
                </div>
              ))}
            </div>

            {/* Milestones */}
            <div style={{background:"white",borderRadius:16,padding:"18px",border:`1px solid ${C.oat}`}}>
              <div style={{color:C.mid,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Milestones</div>
              {[
                {label:"First session",           done:sessions.length>=1,  emoji:"🌱"},
                {label:"5-day streak",             done:streak>=5,           emoji:"🔥"},
                {label:"Diagnostic complete",      done:!!diagnostic,        emoji:"📋"},
                {label:"10 sessions",              done:sessions.length>=10, emoji:"📅"},
                {label:"Any score hits 15",        done:latest&&Object.values(latest.scores).some(v=>v>=15), emoji:"⭐"},
                {label:"Week 2 started",           done:week>=2,             emoji:"📈"},
                {label:"All scores above 12",      done:latest&&Object.values(latest.scores).every(v=>v>=12), emoji:"💪"},
                {label:"30-day streak",            done:streak>=30,          emoji:"🚀"},
                {label:"Week 8 — Mastery",         done:week>=8,             emoji:"🏅"},
              ].map((m,i,arr)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"9px 0",borderBottom:i<arr.length-1?`1px solid ${C.oat}`:"none",opacity:m.done?1:0.35}}>
                  <div style={{fontSize:16}}>{m.done?m.emoji:"○"}</div>
                  <div style={{color:m.done?C.char:C.light,fontSize:13,fontWeight:m.done?600:400}}>{m.label}</div>
                  {m.done&&<div style={{marginLeft:"auto",color:C.sage,fontSize:11,fontWeight:700}}>✓</div>}
                </div>
              ))}
            </div>
          </>}
        </div>

        <div style={{maxWidth:440,margin:"0 auto",padding:"0 20px"}}>
          <button onClick={()=>setScreen("home")} style={{background:C.terra,color:"white",border:"none",borderRadius:14,padding:"15px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",marginTop:8}}>
            ← Back to Home
          </button>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
